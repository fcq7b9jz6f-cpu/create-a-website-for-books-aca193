<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Create a website for books</title>
<meta name="description" content="Create a website for books — موقع منشور بواسطة Webly" />
<style>
  * { box-sizing: border-box; }
  html, body, #root { min-height: 100%; margin: 0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Cairo, Tahoma, sans-serif; }
  .webly-fallback { min-height: 100vh; display: grid; place-items: center; padding: 32px; text-align: center; }
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Cairo', sans-serif;
  background-color: #f8f9fa;
  color: #333;
  line-height: 1.6;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2rem 0;
}

.logo {
  font-size: 1.8rem;
  font-weight: 700;
  color: #2c3e50;
  border-right: 4px solid #e67e22;
  padding-right: 10px;
}

.nav a {
  margin-right: 20px;
  text-decoration: none;
  color: #555;
  font-weight: 600;
  transition: color 0.3s;
}

.nav a:hover {
  color: #e67e22;
}

.hero {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
  color: white;
  border-radius: 20px;
  margin-bottom: 40px;
}

.hero h1 {
  font-size: 2.5rem;
  margin-bottom: 15px;
}

.hero p {
  font-size: 1.1rem;
  opacity: 0.9;
  margin-bottom: 30px;
}

.search-bar input {
  width: 100%;
  max-width: 500px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 30px;
  padding-bottom: 60px;
}

.book-card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  transition: transform 0.3s;
}

.book-card:hover {
  transform: translateY(-10px);
}

.book-image {
  position: relative;
  height: 250px;
}

.book-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.category-tag {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(230, 126, 34, 0.9);
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
}

.book-info {
  padding: 20px;
}

.book-info h3 {
  font-size: 1.2rem;
  margin-bottom: 8px;
  color: #2c3e50;
}

.author {
  color: #7f8c8d;
  font-size: 0.9rem;
  margin-bottom: 12px;
}

.description {
  font-size: 0.85rem;
  color: #666;
  height: 60px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  margin-bottom: 20px;
}

.footer-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid #eee;
  padding-top: 15px;
}

.price {
  font-weight: 700;
  color: #27ae60;
  font-size: 1.1rem;
}

.buy-btn {
  background: #2c3e50;
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  transition: background 0.3s;
}

.buy-btn:hover {
  background: #e67e22;
}

.footer {
  text-align: center;
  padding: 40px 0;
  border-top: 1px solid #ddd;
  color: #888;
}

@media (max-width: 600px) {
  .hero h1 { font-size: 1.8rem; }
  .header { flex-direction: column; gap: 20px; }
}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"><main class="webly-fallback">جارٍ تحميل الموقع...</main></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback, useReducer, useContext, createContext, Fragment } = React;


const BOOKS = [
  {
    id: 1,
    title: "مقدّمة ابن خلدون",
    author: "ابن خلدون",
    category: "فلسفة وتاريخ",
    description: "يعتبر هذا الكتاب مؤسس علم الاجتماع، حيث يستعرض فيه ابن خلدون أحوال البشر وطبائعهم والعمران البشري.",
    price: "45.00 ر.س",
    cover: "https://images.unsplash.com/photo-1544648151-1868351f7478?auto=format&fit=crop&q=80&w=400"
  },
  {
    id: 2,
    title: "حي بن يقظان",
    author: "ابن طفيل",
    category: "رواية فلسفية",
    description: "قصة رمزية فريدة تتحدث عن تطور العقل البشري والبحث عن الحقيقة واكتشاف وجود الخالق من خلال التأمل.",
    price: "32.00 ر.س",
    cover: "https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&q=80&w=400"
  },
  {
    id: 3,
    title: "نقد العقل المحض",
    author: "إيمانويل كانط",
    category: "فلسفة",
    description: "أحد أهم الكتب في تاريخ الفلسفة الغربية، يبحث في حدود المعرفة الإنسانية وكيفية إدراكنا للعالم.",
    price: "60.00 ر.س",
    cover: "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&q=80&w=400"
  },
  {
    id: 4,
    title: "البداية والنهاية",
    author: "ابن كثير",
    category: "تاريخ",
    description: "موسوعة تاريخية ضخمة تبدأ من بداية الخلق حتى أحداث القرن الثامن الهجري.",
    price: "120.00 ر.س",
    cover: "https://images.unsplash.com/photo-1506880018603-83d5b814b5a6?auto=format&fit=crop&q=80&w=400"
  }
];

function App() {
  const [searchTerm, setSearchTerm] = useState("");

  const filteredBooks = BOOKS.filter(book => 
    book.title.includes(searchTerm) || book.author.includes(searchTerm)
  );

  return (
    <div className="container" dir="rtl">
      <header className="header">
        <div className="logo">مكتبة النور</div>
        <nav className="nav">
          <a href="#">الرئيسية</a>
          <a href="#">الأكثر مبيعاً</a>
          <a href="#">من نحن</a>
        </nav>
      </header>

      <section className="hero">
        <h1>اكتشف عالم المنسوج بحبر العقول</h1>
        <p>رحلتك القادمة تبدأ من بين صفحات كتاب. تصفح مجموعتنا المختارة من كنوز الأدب والفلسفة.</p>
        <div className="search-bar">
          <input 
            type="text" 
            placeholder="ابحث عن كتاب أو مؤلف..." 
            value={searchTerm}
            onChange={(e) => setSearchTerm(e.target.value)}
          />
        </div>
      </section>

      <main className="book-grid">
        {filteredBooks.map(book => (
          <div key={book.id} className="book-card">
            <div className="book-image">
              <img src={book.cover} alt={book.title} />
              <span className="category-tag">{book.category}</span>
            </div>
            <div className="book-info">
              <h3>{book.title}</h3>
              <p className="author">{book.author}</p>
              <p className="description">{book.description}</p>
              <div className="footer-card">
                <span className="price">{book.price}</span>
                <button className="buy-btn">أضف للسلة</button>
              </div>
            </div>
          </div>
        ))}
      </main>

      <footer className="footer">
        <p>جميع الحقوق محفوظة © 2024 مكتبة النور</p>
      </footer>
    </div>
  );
}
try {
  const rootElement = document.getElementById('root');
  if (!rootElement) throw new Error('Missing #root element');
  if (typeof App !== 'function' && typeof App !== 'object') throw new Error('App component was not exported correctly');
  ReactDOM.createRoot(rootElement).render(React.createElement(App));
} catch (error) {
  document.getElementById('root').innerHTML = '<pre class="webly-fallback" dir="ltr" style="white-space:pre-wrap;color:#b91c1c">' + (error && error.stack ? error.stack : error) + '</pre>';
}
</script>
</body>
</html>
